<script>
  (function () {
    const WA_NUMBER = "33781987928";

    const WA_TEXT = {
      en: `Hello KS Group Concierge,

I would like to arrange concierge support.

• Service:
• Location(s):
• Date(s) & time:
• Guests:
• Additional requirements:

Please confirm availability and next steps.

Thank you.`,
      fr: `Bonjour KS Group Concierge,

Je souhaite organiser une assistance concierge.

• Service :
• Lieu(x) :
• Date(s) & heure :
• Invités :
• Exigences supplémentaires :

Merci de confirmer les disponibilités et les prochaines étapes.

Cordialement.`,
      es: `Hola KS Group Concierge,

Me gustaría organizar asistencia de concierge.

• Servicio:
• Lugar(es):
• Fecha(s) y hora:
• Invitados:
• Requisitos adicionales:

Por favor, confirme disponibilidad y próximos pasos.

Gracias.`
    };

    // If your i18n uses localStorage, keep this; if not, it's still fine.
    const LANG_KEY = "pap_lang";

    function getLang() {
      const sel = document.getElementById("langSelect");
      const v = (sel && sel.value) || localStorage.getItem(LANG_KEY) || "en";
      return String(v).toLowerCase();
    }

    function updateWhatsAppHref() {
      const a = document.querySelector("a.wa-icon");
      if (!a) return;

      const lang = getLang();
      const msg = WA_TEXT[lang] || WA_TEXT.en;
      a.href = "https://wa.me/" + WA_NUMBER + "?text=" + encodeURIComponent(msg);
    }

    // Run once immediately + on DOM ready + on language change
    updateWhatsAppHref();
    document.addEventListener("DOMContentLoaded", updateWhatsAppHref);

    const sel = document.getElementById("langSelect");
    if (sel) sel.addEventListener("change", updateWhatsAppHref);
  })();
</script>
